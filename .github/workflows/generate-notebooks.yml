name: Generate Notebooks

on:
  push:
    branches: [master]
    paths: ['examples/**/*.py']

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install jupytext
        run: pip install jupytext

      - name: Generate notebooks
        run: |
          mkdir -p notebooks
          for py in examples/**/*.py examples/*.py; do
            [ -f "$py" ] || continue
            # Skip utilities and non-example files
            basename=$(basename "$py")
            case "$basename" in
              example_utils.py|__init__.py) continue ;;
            esac
            jupytext --to notebook "$py" --output "notebooks/${basename%.py}.ipynb"
          done

      - name: Commit notebooks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notebooks/
          if git diff --cached --quiet; then
            echo "No notebook changes"
          else
            git commit -m "Auto-generate notebooks from examples [skip ci]"
            git push
          fi
